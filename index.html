<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Controle de Combustível</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #d9d9d9;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 1200px;
    }

    .phone-screen {
      width: 100%;
      max-width: 420px;
      margin: auto;
      background: linear-gradient(180deg, #0b1730, #071122);
      border-radius: 30px;
      padding: 18px;
      color: white;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 15px;
      text-align: center;
    }

    .full {
      grid-column: 1 / -1;
    }

    /* RESPONSIVO TABLET */
    @media (min-width: 768px) {
      .phone-screen {
        max-width: 760px;
      }

      .grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    /* RESPONSIVO NOTEBOOK */
    @media (min-width: 1024px) {
      .phone-screen {
        max-width: 1100px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="phone-screen">

      <h2>Controle de Combustível</h2>

      <div class="grid">
        <div class="card">Gastos do Mês<br><b>R$ 379,37</b></div>
        <div class="card">KM Rodados<br><b>448 km</b></div>

        <div class="card">Consumo Médio<br><b>8,7 km/L</b></div>
        <div class="card">Combustível<br><b>82%</b></div>

        <div class="card full">Desempenho Semanal</div>

        <div class="card">Último Abastecimento<br><b>51 L</b></div>
        <div class="card">Custo por KM<br><b>R$ 0,85</b></div>
      </div>

    </div>
  </div>
</body>
</html>
<div id="tela-inicio" class="tela ativa">
  <!-- SUA DASHBOARD -->
</div>

<div id="tela-abastecimento" class="tela">
  <h2>Abastecimentos</h2>
</div>

<div id="tela-config" class="tela">
  <h2>Configurações</h2>
</div>

<div class="bottom-nav">
  <button onclick="trocarTela('inicio')">Início</button>
  <button onclick="trocarTela('abastecimento')">Abastecimentos</button>
  <button onclick="trocarTela('config')">Config</button>
</div>
<script>
function trocarTela(nome) {
  document.querySelectorAll('.tela').forEach(t => {
    t.classList.remove('ativa');
  });

  document.getElementById('tela-' + nome).classList.add('ativa');
}
</script>
